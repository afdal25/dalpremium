<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png?v=2" />
    <link rel="apple-touch-icon" href="/favicon.png?v=2" />
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
    <link rel="preconnect" href="https://dalpremium-backend.onrender.com" />
    <link rel="dns-prefetch" href="https://dalpremium-backend.onrender.com" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="DALPREMIUM adalah web beli aplikasi premium murah, cepat, aman, dan terpercaya."
    />
    <meta name="theme-color" content="#0f0d0a" />
    <title>DALPREMIUM - Aplikasi Premium Murah</title>
    <script>
      document.documentElement.dataset.hash = location.hash.replace("#", "");

      (function () {
        var isLocalhost = /^(localhost|127\.0\.0\.1)$/.test(location.hostname);
        var apiBase = isLocalhost
          ? "http://localhost:5000/api"
          : "https://dalpremium-backend.onrender.com/api";

        window.__DALPREMIUM_API_BASE_URL__ = apiBase;

        if (location.pathname === "/" || location.pathname === "/shop") {
          window.__DALPREMIUM_SHOP_PREFETCH__ = fetch(apiBase + "/shop", {
            headers: { Accept: "application/json" },
          }).then(function (response) {
            if (!response.ok) {
              throw new Error("Shop preload failed");
            }

            return response.json();
          });
        }
      })();

      try {
        var cachedBanner = localStorage.getItem("dalpremiumFirstBannerImage");

        if (
          cachedBanner &&
          document.documentElement.dataset.hash !== "produk"
        ) {
          var preloadBanner = document.createElement("link");
          preloadBanner.rel = "preload";
          preloadBanner.as = "image";
          preloadBanner.href = cachedBanner;
          preloadBanner.fetchPriority = "high";
          document.head.appendChild(preloadBanner);
        }
      } catch (error) {
        /* localStorage may be unavailable in private browsing modes. */
      }
    </script>
    <style>
      html,
      body {
        margin: 0;
        background: #0f0d0a;
        color: #fff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .app-shell {
        min-height: 100vh;
        background: #0f0d0a;
      }

      .app-shell-header {
        height: 76px;
        border-bottom: 1px solid rgba(213, 167, 86, 0.16);
        background: rgba(15, 13, 10, 0.96);
      }

      .app-shell-main {
        max-width: 80rem;
        margin: 0 auto;
        padding: 1.75rem 1rem;
      }

      .app-shell-hero {
        aspect-ratio: 3 / 1;
        border: 1px solid rgba(213, 167, 86, 0.15);
        border-radius: 1rem;
        background: linear-gradient(110deg, #17130f 8%, #241b13 18%, #17130f 33%);
        background-size: 200% 100%;
      }

      .app-shell-title {
        margin: 2rem 0 0;
        color: #d5a756;
        text-align: center;
        font-size: 1.5rem;
        line-height: 2rem;
        font-weight: 900;
      }

      .app-shell-subtitle {
        margin: 0.5rem 0 0;
        color: #a1a1aa;
        text-align: center;
        font-size: 0.875rem;
        font-weight: 700;
      }

      html[data-hash="produk"] .app-shell-hero {
        display: none;
      }

      html[data-hash="produk"] .app-shell-title {
        margin-top: 2rem;
      }

      @media (min-width: 640px) {
        .app-shell-header {
          height: 84px;
        }

        .app-shell-main {
          padding: 1.75rem 1.5rem;
        }

        .app-shell-hero {
          min-height: 320px;
          aspect-ratio: auto;
          border-radius: 1.75rem;
        }

        .app-shell-title {
          font-size: 1.875rem;
          line-height: 2.25rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-shell" aria-label="DALPREMIUM loading">
        <div class="app-shell-header"></div>
        <main class="app-shell-main">
          <div class="app-shell-hero"></div>
          <h1 class="app-shell-title">Pilih Aplikasi Premium</h1>
          <p class="app-shell-subtitle">Murah, Aman, dan Terpercaya</p>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
